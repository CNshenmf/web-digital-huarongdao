<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡通护眼版数字华容道</title>
    <!-- 修复：统一相对路径，确保CSS文件正常加载 -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/component.css">
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">卡通数字华容道</h1>
        <div class="game-control">
            <button id="startBtn" class="control-btn">开始游戏</button>
            <button id="resetBtn" class="control-btn">重置游戏</button>
            <button id="levelBtn" class="control-btn">切换难度</button>
        </div>
        <div class="game-board" id="gameBoard">
            <!-- 游戏方块由JS动态生成 -->
        </div>
        <div class="game-info">
            <span>步数：<span id="stepCount">0</span></span>
            <span>难度：<span id="levelText">简单（3x3）</span></span>
        </div>
    </div>

    <!-- 修复：JS加载顺序（工具函数→游戏逻辑→入口文件），确保无依赖报错 -->
    <script src="../js/utils.js"></script>
    <script src="../js/game.js"></script>
    <script src="../js/index.js"></script>
</body>
</html>
